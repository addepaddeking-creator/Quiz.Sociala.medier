<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz Sociala medier</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .question {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .question h5 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .buttons {
      grid-column: span 3;
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }

    button.ratta {
      background-color: #28a745;
      color: white;
    }

    button.reset {
      background-color: #6c757d;
      color: white;
    }

    /* För rätt/fel färgning */
    /*.correct {
      background-color: #d4edda;
    }
    .incorrect {
      background-color: #f8d7da;
    } */
  </style>
</head>

  <h1>Quiz</h1>

  <form name="fragefalt">
